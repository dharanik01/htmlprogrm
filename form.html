<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    </head>
<body>
    <form>
        <center>
        <h1>LOGIN FORM</h1>
        <label>User Name :</label>
        <input type="text" placeholder="UserName" name="un" minlength="20" maxlength="20">
        <br><br>
        <label>Password :</label>
        <input type="password" placeholder="Password" name="pw" minlength="20" maxlength="20">
        <br><br>
        <label>Email Id :</label>
        <input type="email" placeholder="Email" name="em" minlength="20" maxlength="20">
        <br><br>
        <label>Contact No :</label>
        <input type="number" placeholder="Contact No" name="cn" minlength="20" maxlength="20">
        <br><br>
        <label>Gender :</label>
        <input type="radio" name="gen">Male
        <input type="radio" name="gen">Female
        <br><br>
        <label>Select Your DoB :</label>
        <input type="date" placeholder="Select your DOB">
        <br><br>
        <input type="submit">
        </center>
        </form>
        
</body>
</html>
